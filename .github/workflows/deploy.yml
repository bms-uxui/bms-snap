name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hurryup-vue/package-lock.json
      - run: npm ci
        working-directory: hurryup-vue
      - run: npm run build
        working-directory: hurryup-vue
        env:
          VITE_TAIGA_BASE_URL: ${{ vars.VITE_TAIGA_BASE_URL }}
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hurryup-vue/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
